    <!-- Testimonial carousel -->
    <script>
      (function() {
        var carousel = document.getElementById('testimonial-carousel');
        if (!carousel) return;
        var slides = carousel.querySelectorAll('.testimonial-slide');
        var dots = document.querySelectorAll('#testimonial-dots button');
        var current = 0;
        var total = slides.length;
        var interval;

        // Calculate max height across all slides and fix the container
        function setHeight() {
          var maxH = 0;
          for (var i = 0; i < slides.length; i++) {
            slides[i].style.position = 'relative';
            slides[i].style.opacity = i === current ? '1' : '0';
            var h = slides[i].offsetHeight;
            if (h > maxH) maxH = h;
          }
          carousel.style.minHeight = maxH + 'px';
          // Set all slides to absolute
          for (var i = 0; i < slides.length; i++) {
            slides[i].style.position = 'absolute';
            slides[i].style.top = '0';
            slides[i].style.left = '0';
            slides[i].style.right = '0';
            slides[i].style.opacity = i === current ? '1' : '0';
            slides[i].style.transform = i === current ? 'translateX(0)' : 'translateX(60px)';
            slides[i].style.transition = 'opacity 0.6s ease, transform 0.6s ease';
          }
        }
        setHeight();
        window.addEventListener('resize', setHeight);

        function goTo(next) {
          var prev = current;
          if (next === prev) return;
          var dir = next > prev ? 1 : -1;
          // outgoing slide
          slides[prev].style.opacity = '0';
          slides[prev].style.transform = 'translateX(' + (-60 * dir) + 'px)';
          // incoming slide
          slides[next].style.transform = 'translateX(' + (60 * dir) + 'px)';
          slides[next].style.transition = 'none';
          slides[next].offsetHeight;
          slides[next].style.transition = 'opacity 0.6s ease, transform 0.6s ease';
          slides[next].style.opacity = '1';
          slides[next].style.transform = 'translateX(0)';
          // update dots
          dots[prev].className = 'w-2.5 h-2.5 rounded-full bg-outline-variant opacity-40';
          dots[next].className = 'w-2.5 h-2.5 rounded-full bg-primary opacity-100';
          current = next;
        }

        function startAuto() {
          interval = setInterval(function() {
            goTo((current + 1) % total);
          }, 10000);
        }

        dots.forEach(function(dot, i) {
          dot.addEventListener('click', function() {
            clearInterval(interval);
            goTo(i);
            startAuto();
          });
        });

        startAuto();
      })();
    </script>
